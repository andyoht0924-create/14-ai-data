<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>검색결과</title>
    <link
  rel="stylesheet"
  href="https://cdn.jsdelivr.net/npm/@picocss/pico@2/css/pico.min.css"
>
</head>
<body>
    <main class="container">
        <h1>뉴스스크래핑 결과</h1>
    <p>{{ keyword }}(으)로 검색되었습니다.</p>
    <a href="/export?keyword={{keyword}}">
        <button class="secondnary">
            csv 다운로드
        </button>
    </a>
    <table>
        <thead>
            <tr>
                <td>No</td>
                <td>기사제목</td>
                <td>언론사</td>
                <td>기사요약</td>
            </tr>
        </thead>
        <tbody>
            {% for i, article in articles %}
            <tr>
                <td>{{ i+1 }}</td>
                <td>
                    <a target="_blank" href="{{ article['href'] }}">
                        {{ article["title"] }}
                    </a>
                </td>
                <td>{{ article["press"] }}</td>
                <td>{{ article["summary"] }}</td>
            </tr>
            {% endfor %}
        </tbody>
    </table>
    </main>
</body>
</html>
